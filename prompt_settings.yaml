# Prompt 模板.使用 jinja2 格式


# 告警电力解析提示词
llm_model:
  default: '{{input}}'
  with_history: "这是人类和 AI 之间的友好对话。\nAI非常健谈并从其上下文中提供了大量的具体细节。\n\n当前对话:\n{{history}}\n
    Human: {{input}}\nAI:"
warning:
  analyze: "你是电力行业告警处置报告审核专家，严格遵循《电力监控系统安全防护规定》《网络安全法》，审核以下报告:\n【研判维度】\n1. 内容完整性，包括原因分析、整改结果、设备信息、故障排查过程、是否全面排查2.
    处置合规性：处置步骤是否清晰可追溯，处置结果是否明确\n3. 原因分析有效性：原因是否明确，内容是否符合逻辑\n4. 整改闭环：整改措施具体可执行\n5.
    如果严重违规的告警，是否按照四不放过原则进行分析和整改(事故原因未查清不放过、责任人员未处理不放过、整改措施未落实不放过、有关人员未受到教育不放过)4. 历史一致性：与同类告警处置方案无矛盾，差异需说明合理原因\n\
    【同类电力告警参考】\n{{retrieved_info}}\n【本次待审核报告】\n{{report_info}}\n【输出要求】严格按以下JSON格式返回，key的字段一定要匹配，语言贴合电力运维场景：\n\
    {'audit_result': '通过/驳回/需人工复核',\n'audit_details': '说明审核的细节',\n'summary': '报告核心总结（100字内，含告警类型、处置结果、合规情况）',\n\
    'reject_reason': '驳回需说明具体修改要求，否则为空',\n'power_suggestion': '电力行业专属优化建议'\n} "
  extract: "你是专业的信息抽取助手。请从下面的【Word识别文本】和【Word识别表格】中，严格按照要求抽取结构化信息，只返回标准JSON。\n【抽取规则】\n
    1. 严格按照指定字段抽取，不要遗漏，不要新增字段。\n2. 内容必须忠实原文，不编造、不脑补、不扩写。\n3. 若某个字段无信息，填空字符串 。\n4.
    告警是否违规：只能填 '是' 或 '否' 或 ''。\n5. 判断是否违规依据：事件内容中是否包含违反《电力监控系统安全防护规定》类似字样。\n6. 时间格式保持原文格式。\n\
    【Word识别文本】\n{{full_text}}\n【Word识别表格数据】\n{{table_data}}\n\n【输出要求】严格按以下JSON格式返回，key的字段一定要匹配\n\
    {'报告标题': '','告警信息': '','告警是否违规': '','设备名称': '','设备类型': '','告警时间': '','告警内容': '','处置过程':
    '','原因分析': '','责任人员和责任单位处理': '','人员教育培训': '','整改情况': '','防范措施': ''}"

# RAG 用模板，可用于知识库问答、文件对话
rag:
  default: "【指令】根据已知信息，简洁和专业的来回答问题。如果无法从中得到答案，请说 “根据已知信息无法回答该问题”，不允许在答案中添加编造成分，答案请使用中文。\n\
    \n【已知信息】{{context}}\n\n【问题】{{question}}\n"
  empty: "请你回答我的问题:\n{{question}}"
